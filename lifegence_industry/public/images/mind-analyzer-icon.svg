<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#6c5ce7" opacity="0.1"/>

  <!-- Brain outline (left hemisphere) -->
  <path d="M32 12c-8 0-14 6-14 14c0 3 1 5.5 2.5 7.5c-1 1.5-1.5 3.5-1.5 5.5c0 5 4 9 9 9h4"
        stroke="#6c5ce7" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Brain outline (right hemisphere) -->
  <path d="M32 12c8 0 14 6 14 14c0 3-1 5.5-2.5 7.5c1 1.5 1.5 3.5 1.5 5.5c0 5-4 9-9 9h-4"
        stroke="#6c5ce7" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Brain center line -->
  <path d="M32 12v36" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 2"/>

  <!-- Left brain details -->
  <path d="M22 22c3 0 5 2 5 4s-2 3-4 3" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M20 32c2.5 0 4 1.5 4 3s-1.5 2.5-3 2.5" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Right brain details -->
  <path d="M42 22c-3 0-5 2-5 4s2 3 4 3" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M44 32c-2.5 0-4 1.5-4 3s1.5 2.5 3 2.5" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Pulse/waveform at bottom representing analysis -->
  <path d="M12 54h8l2-4l3 8l3-12l3 12l3-8l2 4h8"
        stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Analysis dots -->
  <circle cx="18" cy="18" r="2" fill="#a855f7"/>
  <circle cx="46" cy="18" r="2" fill="#a855f7"/>
  <circle cx="32" cy="8" r="2" fill="#6c5ce7"/>
</svg>
