<div class="mind-analyzer-dashboard">
    <!-- Header -->
    <div class="va-header">
        <div class="va-header-left">
            <h2 class="va-title">
                <svg class="va-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                Mind Analyzer
            </h2>
        </div>
        <div class="va-header-right">
            <button class="btn btn-sm btn-default va-refresh-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                更新
            </button>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="va-summary-section">
        <div class="va-summary-card">
            <div class="va-summary-icon va-icon-sessions">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
            </div>
            <div class="va-summary-content">
                <span class="va-summary-value" data-summary="total_sessions">--</span>
                <span class="va-summary-label">総セッション数</span>
            </div>
        </div>
        <div class="va-summary-card">
            <div class="va-summary-icon va-icon-stress">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <div class="va-summary-content">
                <span class="va-summary-value" data-summary="avg_stress">--%</span>
                <span class="va-summary-label">平均ストレス</span>
            </div>
        </div>
        <div class="va-summary-card">
            <div class="va-summary-icon va-icon-ps">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
            </div>
            <div class="va-summary-content">
                <span class="va-summary-value" data-summary="avg_ps">--%</span>
                <span class="va-summary-label">平均PS Score</span>
            </div>
        </div>
        <div class="va-summary-card">
            <div class="va-summary-icon va-icon-triggers">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
            </div>
            <div class="va-summary-content">
                <span class="va-summary-value" data-summary="total_triggers">--</span>
                <span class="va-summary-label">検出トリガー</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="va-main-content">
        <!-- Session List -->
        <div class="va-sessions-panel">
            <div class="va-panel-header">
                <h3>分析セッション一覧</h3>
                <div class="va-filter-controls">
                    <select class="form-control input-sm va-mode-filter">
                        <option value="">すべてのモード</option>
                        <option value="Individual">個人分析</option>
                        <option value="Meeting">会議分析</option>
                    </select>
                    <select class="form-control input-sm va-period-filter">
                        <option value="7">過去7日</option>
                        <option value="30" selected>過去30日</option>
                        <option value="90">過去90日</option>
                        <option value="all">すべて</option>
                    </select>
                </div>
            </div>
            <div class="va-sessions-list">
                <p class="va-loading">読み込み中...</p>
            </div>
        </div>

        <!-- Session Detail -->
        <div class="va-detail-panel" style="display: none;">
            <div class="va-panel-header">
                <h3>セッション詳細</h3>
                <button class="btn btn-sm btn-default va-close-detail">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="va-detail-content">
                <!-- Detail content loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Recent Triggers -->
    <div class="va-triggers-section">
        <div class="va-panel-header">
            <h3>最近のトリガー</h3>
        </div>
        <div class="va-triggers-list">
            <p class="va-no-triggers">トリガーは検出されていません</p>
        </div>
    </div>
</div>
